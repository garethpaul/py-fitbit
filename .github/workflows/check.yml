name: Check

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  legacy-python:
    name: Python 2.7 legacy verification
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    container:
      image: python:2.7.18@sha256:c934af72b8bd03b9804d5bde2569c320926e70392d708d113a2e71bcf98c8a20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Show Python runtimes
        run: python2 --version && python3 --version
      - name: Run full mocked legacy verification
        run: make check
